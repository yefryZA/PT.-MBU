<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi PT. MBU - Secure Mode</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #e0f2fe; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; width: 90%; max-width: 400px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        h2 { color: #0369a1; margin-bottom: 20px; }
        .camera-box { width: 100%; height: 250px; background: #f1f5f9; border-radius: 15px; margin-bottom: 15px; border: 3px solid #0ea5e9; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .input-group { text-align: left; margin-bottom: 12px; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #475569; }
        select, input { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #cbd5e1; box-sizing: border-box; }
        .btn-absen { background: #0284c7; color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-absen:disabled { background: #94a3b8; }
        #status-msg { margin-top: 15px; padding: 10px; border-radius: 8px; display: none; font-weight: bold; }
        .success { background: #dcfce7; color: #166534; display: block !important; }
        .error { background: #fee2e2; color: #991b1b; display: block !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>PT. MBU Absensi</h2>
    <div class="camera-box"><video id="video" autoplay playsinline></video></div>
    <canvas id="canvas" style="display:none;"></canvas>

   <div class="input-group">
    <label>Nama Karyawan</label>
    <input type="text" id="nama-karyawan" placeholder="Klik untuk cari nama..." readonly 
        onclick="bukaPopupNama()" 
        style="width:100%; padding:12px; border-radius:8px; border:1px solid #cbd5e1; cursor:pointer; background:#f8fafc; font-weight:bold; font-size:16px;">
</div>

    <div class="input-group">
        <label>Tipe Absen</label>
        <select id="tipe-absen">
            <option value="MASUK">ABSEN MASUK</option>
            <option value="PULANG">ABSEN PULANG</option>
        </select>
    </div>

    <div class="input-group">
        <label>Password Khusus</label>
        <input type="password" id="pass-karyawan" placeholder="Sandi 4 digit" maxlength="4">
    </div>

    <div class="input-group">
        <label>Role</label>
        <select id="role" onchange="toggleStatusTugas()">
            <option value="Staff">Staff Kantor</option>
            <option value="Sopir">Sopir Lapangan</option>
        </select>
    </div>

    <div id="group-status-tugas" class="input-group" style="display:none;">
        <label>Status Tugas</label>
        <select id="status-tugas">
            <option value="STANDBY">STANDBY</option>
            <option value="OTW">OTW (DI JALAN)</option>
        </select>
    </div>

  ...
    <button class="btn-absen" id="btn-submit">ABSEN SEKARANG</button>
    <div id="status-msg"></div>

    <div style="margin-top: 5px; text-align: center;">
        <p style="font-size: 12px; color: #475569; font-weight: 800; letter-spacing: 2px; font-family: sans-serif; margin: 0; padding: 10px 0;">
            SYSTEM BY <span style="color: #0284c7;">YEFRY.ZA</span>
        </p>
    </div>
</div>

<div id="popup-nama" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; justify-content:center; align-items:flex-start; padding-top:80px; backdrop-filter:blur(4px);">
    <div style="background:white; width:92%; max-width:400px; border-radius:15px; overflow:hidden; box-shadow:0 15px 30px rgba(0,0,0,0.4);">
        <div style="padding:15px; background:#0284c7; color:white; display:flex; justify-content:space-between; align-items:center;">
            <b style="font-size:18px;">Cari Nama</b>
            <span onclick="tutupPopupNama()" style="cursor:pointer; font-size:28px; font-weight:bold;">&times;</span>
        </div>
        <div style="padding:12px;">
            <input type="text" id="cari-input" placeholder="Ketik 1-2 huruf nama anda..." oninput="filterNama()" 
                style="width:100%; padding:12px; border:2px solid #e2e8f0; border-radius:10px; font-size:16px; outline:none; border-color:#0284c7;">
        </div>
        <div id="list-nama" style="max-height:300px; overflow-y:auto; padding:5px;">
            </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB8kpAMYAg1tC_8AuiQo3N2ecdrd4XbfuQ",
        authDomain: "pt-mbu.firebaseapp.com",
        projectId: "pt-mbu",
        storageBucket: "pt-mbu.firebasestorage.app",
        messagingSenderId: "338793529445",
        appId: "1:338793529445:web:e352eaef94d282c5ba468c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app, "https://pt-mbu-default-rtdb.asia-southeast1.firebasedatabase.app/");

    // ---------------------------------------
    // 1. DATA KARYAWAN (SEKARANG KOSONG KARENA AMBIL DARI FIREBASE)
    // --------------------------------------- 
    let dataPassword = {}; 

    // SAKTI: Ambil daftar nama & password dari database secara real-time
    onValue(ref(db, 'pt_mbu/master_karyawan'), (snapshot) => {
        if (snapshot.exists()) {
            dataPassword = snapshot.val();
            console.log("Data Karyawan Diperbarui!");
        }
    });

    // --- LOGIKA POPUP NAMA OTOMATIS ---
    window.bukaPopupNama = function() {
        document.getElementById('popup-nama').style.display = 'flex';
        document.getElementById('cari-input').value = ""; 
        document.getElementById('cari-input').focus();    
        filterNama(); 
    };

    window.tutupPopupNama = function() {
        document.getElementById('popup-nama').style.display = 'none';
    };

    window.filterNama = function() {
        const input = document.getElementById('cari-input').value.toLowerCase();
        const wadah = document.getElementById('list-nama');
        wadah.innerHTML = "";

        // Sekarang membaca dari variabel dataPassword yang sudah terisi dari Firebase
        Object.keys(dataPassword).forEach(nama => {
            if (nama.toLowerCase().includes(input)) {
                const item = document.createElement('div');
                item.innerText = nama;
                item.style = "padding:15px; border-bottom:1px solid #f1f5f9; cursor:pointer; font-weight:bold; font-size:16px; color:#334155;";
                
                item.onclick = function() {
                    document.getElementById('nama-karyawan').value = nama;
                    // OTOMATIS Set Role sesuai data di Firebase agar karyawan tidak perlu pilih role lagi
                    if(dataPassword[nama].role) {
                        document.getElementById('role').value = dataPassword[nama].role;
                        toggleStatusTugas(); // Update tampilan input OTW jika dia sopir
                    }
                    tutupPopupNama();
                    document.getElementById('pass-karyawan').focus();
                };

                item.onmouseover = () => item.style.background = "#f0f9ff";
                item.onmouseout = () => item.style.background = "white";
                wadah.appendChild(item);
            }
        });
    };

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const btnSubmit = document.getElementById('btn-submit');

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(s => video.srcObject = s).catch(e => alert("Kamera Error"));

    window.toggleStatusTugas = () => {
        const r = document.getElementById('role').value;
        const group = document.getElementById('group-status-tugas');
        if(group) group.style.display = (r === 'Sopir') ? 'block' : 'none';
    };

    function hitungJarak(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    btnSubmit.onclick = async () => {
        const nama = document.getElementById('nama-karyawan').value;
        const pass = document.getElementById('pass-karyawan').value;
        const tipe = document.getElementById('tipe-absen').value;
        const role = document.getElementById('role').value;
        const st = document.getElementById('status-tugas').value;
        const msg = document.getElementById('status-msg');

        if(!nama || !pass) return alert("Isi Nama & Password, Bang!");

        // --- CEK PASSWORD KARYAWAN (Sekarang ambil property .password dari Firebase) ---
        if(!dataPassword[nama] || pass !== dataPassword[nama].password) {
            return alert("Password Salah, Bang!");
        }
        
        const tglHariIni = new Date().toISOString().split('T')[0];
        const kemaren = new Date();
        kemaren.setDate(kemaren.getDate() - 1);
        const tglKemaren = kemaren.toISOString().split('T')[0];

        const snapHariIni = await get(ref(db, `pt_mbu/absensi/${tglHariIni}/${nama}`));
        const snapKemaren = await get(ref(db, `pt_mbu/absensi/${tglKemaren}/${nama}`));
        
        const dataHariIni = snapHariIni.val() || {};
        const dataKemaren = snapKemaren.val() || {};

        if (tipe === 'MASUK') {
            if (dataHariIni.MASUK) {
                alert("Waduh Bang, anda SUDAH ABSEN MASUK hari ini!");
                return;
            }
        }

        if (tipe === 'PULANG') {
            const adaMasukHariIni = dataHariIni.MASUK;
            const adaMasukKemaren = dataKemaren.MASUK;
            const sudahPulangHariIni = dataHariIni.PULANG;

            if (!adaMasukHariIni && !adaMasukKemaren) {
                alert("Eits! anda BELUM ABSEN MASUK. Tidak bisa absen pulang!");
                return;
            }
            if (adaMasukHariIni && sudahPulangHariIni) {
                alert("anda sudah absen pulang untuk jadwal hari ini!");
                return;
            }
        }
        
        const tgl = tglHariIni; 

        btnSubmit.disabled = true;
        btnSubmit.innerText = "Cek Lokasi...";

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const uLat = pos.coords.latitude;
            const uLon = pos.coords.longitude;
            let boleh = false; let lokNama = "Luar Jangkauan";

            const kantor = [{n:"K1", la:-5.963287, lo:106.001753}, {n:"K2", la:-5.959374, lo:105.999700}];
            kantor.forEach(k => { if(hitungJarak(uLat, uLon, k.la, k.lo) <= 150) { boleh = true; lokNama = k.n; } });
            if(role === 'Sopir' && st === 'OTW') { boleh = true; lokNama = "OTW JALAN"; }

            if(!boleh) {
                msg.innerText = "Gagal: Lokasi tidak sesuai!"; msg.className = "error";
                btnSubmit.disabled = false; btnSubmit.innerText = "ABSEN SEKARANG"; return;
            }

            btnSubmit.innerText = "Kirim Data...";
            const ctx = canvas.getContext('2d'); 
            canvas.width = 400; 
            canvas.height = 300;
            ctx.drawImage(video, 0, 0, 400, 300);
            const foto = canvas.toDataURL('image/jpeg', 0.5);

            video.pause(); 
            const jam = new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});

            await set(ref(db, `pt_mbu/absensi/${tgl}/${nama}/${tipe}`), {
                nama, role, tipe, jam, lokasi: lokNama, foto, timestamp: Date.now()
            });

            msg.innerText = `Berhasil ${tipe}!`; 
            msg.className = "success";
            btnSubmit.innerText = "SUKSES ✅";

            setTimeout(() => {
                video.play(); 
                btnSubmit.disabled = false;
                btnSubmit.innerText = "ABSEN SEKARANG";
                msg.innerText = "";
                document.getElementById('nama-karyawan').value = ""; 
                document.getElementById('pass-karyawan').value = ""; 
                document.getElementById('role').value = "Staff";      
                document.getElementById('tipe-absen').value = "MASUK"; 
                if(document.getElementById('group-status-tugas')) {
                    document.getElementById('group-status-tugas').style.display = 'none';
                }
            }, 3000);

        }, (e) => { alert("GPS Mati!"); btnSubmit.disabled = false; }, {enableHighAccuracy:true});
    };
</script>
</body>
</html>
